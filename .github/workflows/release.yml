# .github/workflows/release.yml
name: Build and Release SKF

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SimpleKillFeed.csproj

      - name: Build project
        run: dotnet build SimpleKillFeed.csproj --configuration Release --no-restore

      - name: Prepare release folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release\SimpleKillFeed
          Copy-Item "bin\Release\net8.0\SimpleKillFeed.dll" "release\SimpleKillFeed\"
          Copy-Item "bin\Release\net8.0\MySqlConnector.dll" "release\SimpleKillFeed\"
          Copy-Item "bin\Release\net8.0\Dapper.dll" "release\SimpleKillFeed\"

      - name: Package plugin
        shell: powershell
        run: |
          Compress-Archive -Path release\* -DestinationPath SKF-${{ github.ref_name }}.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: SKF-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}